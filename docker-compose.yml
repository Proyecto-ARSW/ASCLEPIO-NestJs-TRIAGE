  #     
  #     # RabbitMQ
  #     RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
  #     RABBITMQ_EXCHANGE: asclepio_exchange
  #     RABBITMQ_QUEUE_TRIAGE: triage_events
  #     
  #     # Microservicios externos
  #     OLLAMA_SERVICE_URL: http://ptia-ollama-prelim:3002
  #     CLASSIFIER_SERVICE_URL: http://ptia-triage-classifier:3003
  #     CORE_API_URL: http://asclepio-core:3000
  #     
  #     # API Config
  #     PORT: 3001
  #     API_PREFIX: api/triage
  #     USE_API_GATEWAY: false
  #     
  #     # App Config
  #     NODE_ENV: production
  #     LOG_LEVEL: info
  #     
  #     # JWT
  #     JWT_SECRET: your-super-secret-jwt-key-change-in-production
