services:
  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: asclepio-triage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asclepio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asclepio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asclepio-network

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: asclepio-triage-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asclepio-network

  # ============================================
  # RabbitMQ
  # ============================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: asclepio-triage-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - '5672:5672'   # AMQP
      - '15672:15672' # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - asclepio-network

  # ============================================
  # Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: asclepio-triage-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - asclepio-network

  # ============================================
  # Grafana
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: asclepio-triage-grafana
    restart: unless-stopped
    ports:
      - '4001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - asclepio-network

  # ============================================
  # Triage Service (Backend NestJS) - COMENTADO PARA DESARROLLO
  # ============================================
  # NOTA: Para desarrollo, es mejor correr el backend localmente con:
  # npm run start:dev
  # Esto permite hot-reload y debugging más fácil
  #
  # Para producción, descomenta este bloque y ejecuta:
  # docker-compose up -d --build
  #
  # triage-service:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: asclepio-triage-service
  #   restart: unless-stopped
  #   ports:
  #     - '3001:3001'
  #   environment:
  #     # Base de datos
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/asclepio?schema=triage
  #     
  #     # Redis
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
