version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: asclepio-triage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asclepio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - asclepio-network

  redis:
    image: redis:7-alpine
    container_name: asclepio-triage-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - asclepio-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: asclepio-triage-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'   
      - '15672:15672' 
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - asclepio-network

  prometheus:
    image: prom/prometheus:latest
    container_name: asclepio-triage-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - asclepio-network
  grafana:
    image: grafana/grafana:latest
    container_name: asclepio-triage-grafana
    restart: unless-stopped
    ports:
      - '4001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - asclepio-network

  triage-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asclepio-triage-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/asclepio?schema=triage
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      OLLAMA_PRELIM_URL: http://ptia-ollama-prelim:3002
      TRIAGE_CLASSIFIER_URL: http://ptia-triage-classifier:3003
      CORE_API_URL: http://asclepio-core:3000
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - asclepio-network
    volumes:
      - ./logs:/app/logs

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

networks:
  asclepio-network:
    driver: bridge